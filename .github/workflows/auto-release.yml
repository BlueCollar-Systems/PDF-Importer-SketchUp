name: auto-release

on:
  push:
    branches: [main, master]
    # Docs-only pushes do not mint a release (board Q-08-a / ANS-09-1).
    # Release-pipeline workflow edits under .github/ are NOT ignored: they must
    # rebuild --latest assets. The job if: guard skips chore: bump version to
    # commits, so there is no release loop.
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "_archived/**"
      - "dist/_archived/**"
      - "dev_logs/**"
      - "steel_shapes/**"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-release
  cancel-in-progress: false

jobs:
  release:
    if: "!startsWith(github.event.head_commit.message, 'chore: bump version to') && !contains(github.event.head_commit.message, 'automation/version-bump') && !contains(github.event.head_commit.message, '[skip release]')"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true
          # GITHUB_TOKEN always authenticates checkout; RELEASE_BUMP_TOKEN is used
          # only when pushing the version-bump commit past branch protection.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: false

      - name: Run release gate tests
        run: |
          set -e
          python3 tools/check_su2017_ruby_compat.py extracted/sketchup_ext
          find extracted/sketchup_ext test -type f -name "*.rb" -print0 | xargs -0 -n1 ruby -c
          ruby test/smoke_test.rb
          ruby test/ruby22_compat_test.rb
          ruby test/import_health_test.rb
          ruby test/dependency_resolver_test.rb
          ruby test/qa_report_test.rb
          ruby test/text_mode_routing_test.rb
          docker run --rm -v "${PWD}:/work" -w /work ruby:2.2 bash -lc '
            set -e
            find extracted test -type f -name "*.rb" -print0 | xargs -0 -n1 ruby -c
            ruby test/smoke_test.rb
            ruby test/ruby22_compat_test.rb
            ruby test/import_health_test.rb
          '

      - name: Read committed version
        id: version
        run: |
          python - <<'PY'
          import os
          import pathlib
          import re

          loader = pathlib.Path("extracted/sketchup_ext/bc_pdf_vector_importer.rb")
          metadata = pathlib.Path("extracted/sketchup_ext/bc_pdf_vector_importer/metadata.rb")
          readme = pathlib.Path("README.md")

          loader_text = loader.read_text(encoding="utf-8")
          loader_match = re.search(r"PLUGIN_VERSION\s*=\s*'(\d+\.\d+\.\d+)'", loader_text)
          metadata_match = re.search(
              r"VERSION\s*=\s*'(\d+\.\d+\.\d+)'",
              metadata.read_text(encoding="utf-8"),
          )
          readme_match = re.search(
              r"Version-(\d+\.\d+\.\d+)-(?:green|blue)\.svg",
              readme.read_text(encoding="utf-8"),
          )
          if not loader_match:
              raise SystemExit("Could not find PLUGIN_VERSION in extracted/sketchup_ext/bc_pdf_vector_importer.rb")
          version = loader_match.group(1)
          if not metadata_match or metadata_match.group(1) != version:
              raise SystemExit(f"Version mismatch: loader={version} metadata={metadata_match.group(1) if metadata_match else 'missing'}")
          if not readme_match or readme_match.group(1) != version:
              raise SystemExit(f"Version mismatch: loader={version} readme={readme_match.group(1) if readme_match else 'missing'}")

          out = pathlib.Path(os.environ["GITHUB_OUTPUT"])
          out.write_text(f"version={version}\n", encoding="utf-8")
          PY

      - name: Set release target
        run: |
          echo "RELEASE_TARGET=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Build .rbz
        run: python build_release.py

      - name: Smoke RBZ structure
        run: |
          python - <<'PY'
          import zipfile
          from pathlib import Path

          rbzs = sorted(Path(".").glob("SketchUp-PDF-Importer_v*.rbz"))
          if len(rbzs) != 1:
              raise SystemExit(f"Expected one RBZ, found {len(rbzs)}: {rbzs}")
          with zipfile.ZipFile(rbzs[0]) as zf:
              names = set(zf.namelist())
          required = {
              "bc_pdf_vector_importer.rb",
              "bc_pdf_vector_importer/main.rb",
              "bc_pdf_vector_importer/metadata.rb",
              "bc_pdf_vector_importer/bin/pdftocairo.exe",
          }
          missing = sorted(required - names)
          if missing:
              raise SystemExit(f"RBZ missing required files: {missing}")
          print(f"PASS: {rbzs[0].name} contains required extension files")
          PY

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          TAG="v${{ steps.version.outputs.version }}"
          RBZ="SketchUp-PDF-Importer_v${{ steps.version.outputs.version }}.rbz"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$RBZ" --clobber
          else
            gh release create "$TAG" \
              --target "${RELEASE_TARGET:-$GITHUB_SHA}" \
              --title "$TAG — PDF Vector Importer for SketchUp" \
              --notes "Automated release from latest \`main\` commit.

            **Install:** Download \`${RBZ}\` below, then in SketchUp: **Window > Extension Manager > Install Extension**." \
              --latest \
              "$RBZ"
          fi

      - name: Check website dispatch token secret
        id: website_dispatch_token
        env:
          WEBSITE_DISPATCH_TOKEN: ${{ secrets.WEBSITE_DISPATCH_TOKEN || secrets.BLUECOLLAR_WEBSITE_DISPATCH_TOKEN || secrets.REPO_DISPATCH_TOKEN }}
        run: |
          if [ -n "$WEBSITE_DISPATCH_TOKEN" ]; then
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Dispatch website release update
        if: steps.website_dispatch_token.outputs.has_token == 'true'
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.WEBSITE_DISPATCH_TOKEN || secrets.BLUECOLLAR_WEBSITE_DISPATCH_TOKEN || secrets.REPO_DISPATCH_TOKEN }}
          script: |
            const tag = 'v${{ steps.version.outputs.version }}';
            const payload = {
              source_repo: context.repo.owner + '/' + context.repo.repo,
              source_event: 'auto-release',
              source_ref: context.ref,
              source_sha: context.sha,
              release_tag: tag,
              release_name: tag,
              release_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/releases/tag/${tag}`,
            };

            await github.request('POST /repos/{owner}/{repo}/dispatches', {
              owner: 'BlueCollar-Systems',
              repo: 'BlueCollar-Website',
              event_type: 'product-release',
              client_payload: payload,
            });

            core.info('Dispatched product-release to BlueCollar-Website');

      - name: Warn when website dispatch token is missing
        if: steps.website_dispatch_token.outputs.has_token != 'true'
        run: |
          echo "::warning::Skipping website dispatch because no valid dispatch token secret is configured."
          echo "Set WEBSITE_DISPATCH_TOKEN (or BLUECOLLAR_WEBSITE_DISPATCH_TOKEN / REPO_DISPATCH_TOKEN) to enable cross-repo dispatch."
