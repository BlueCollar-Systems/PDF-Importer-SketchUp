name: corpus-placement

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  corpus-placement:
    runs-on: ubuntu-latest
    env:
      CORPUS_CI_STRICT: '1'
    steps:
      - name: Checkout SU importer
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: false

      - name: Install pdftotext (Poppler)
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils
          pdftotext -v

      - name: Resolve corpus root
        id: corpus
        run: |
          set -e
          ROOT="${BCS_CORPUS_ROOT:-}"
          if [ -z "$ROOT" ]; then
            echo "No BCS_CORPUS_ROOT set — using committed baselines for structure check only."
            echo "available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ ! -d "$ROOT" ]; then
            echo "BCS_CORPUS_ROOT path does not exist: $ROOT"
            echo "available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "available=true" >> "$GITHUB_OUTPUT"
          echo "root=$ROOT" >> "$GITHUB_OUTPUT"

      - name: Validate baseline JSON files
        run: |
          ruby -e "
          require 'json'
          dir = 'test/fixtures/corpus_baselines'
          files = Dir.glob(File.join(dir, '*.json'))
          abort('No baseline JSON files committed') if files.empty?
          files.each do |f|
            JSON.parse(File.read(f))
          end
          puts \"Validated #{files.length} baseline file(s)\"
          "

      - name: Run corpus placement gate
        if: steps.corpus.outputs.available == 'true'
        env:
          BCS_CORPUS_ROOT: ${{ steps.corpus.outputs.root }}
        run: ruby test/corpus_placement_test.rb

      - name: Corpus unavailable notice
        if: steps.corpus.outputs.available != 'true'
        run: |
          echo "::warning::Full corpus placement gate skipped — set repository variable BCS_CORPUS_ROOT on a self-hosted runner or mount the test corpus."
          echo "Baseline JSON structure check passed. Run locally: ruby test/corpus_placement_test.rb"
