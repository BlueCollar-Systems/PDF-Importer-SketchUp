name: steel-shapes-release

on:
  push:
    tags:
      - "steel-v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build steel shapes zip + checksum
        id: pack
        run: |
          TAG="${GITHUB_REF_NAME#steel-}"
          ZIP_NAME="Structural-Steel-SU-Shapes-${TAG}.zip"
          LATEST_ZIP="Structural-Steel-SU-Shapes-latest.zip"
          (cd steel_shapes && zip -r "../${ZIP_NAME}" .)
          cp "$ZIP_NAME" "$LATEST_ZIP"
          sha256sum "$ZIP_NAME" "$LATEST_ZIP" | tee SHA256SUMS.txt
          echo "zip_name=$ZIP_NAME" >> "$GITHUB_OUTPUT"
          echo "latest_zip=$LATEST_ZIP" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Steel Shapes ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            ${{ steps.pack.outputs.zip_name }}
            ${{ steps.pack.outputs.latest_zip }}
            SHA256SUMS.txt
